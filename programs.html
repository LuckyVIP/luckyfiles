<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuckyFiles — программы</title>

    <!-- Аватарка (замени ссылку) -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/xxx/avatar.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== ПЕРЕМЕННЫЕ ===== */
        :root {
            --bg: #f6f9fc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.04);
            --shadow-hover: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
            --btn-bg: #1e293b;
            --btn-text: #ffffff;
            --btn-hover: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0a0a0f;
            --bg-card: #18181f;
            --text: #e9e9f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a82;
            --border: #2a2a35;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
            --input-bg: #22222b;
            --gradient-start: #4f8df7;
            --gradient-end: #9b6cf7;
            --btn-bg: #3b3b4a;
            --btn-text: #ffffff;
            --btn-hover: #4f4f62;
        }

        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .nav-logo i {
            -webkit-text-fill-color: var(--gradient-start);
            margin-right: 6px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .theme-toggle,
        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-family: inherit;
        }

        .theme-toggle:hover,
        .nav-btn:hover {
            background: var(--border);
            transform: scale(1.02);
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
        }

        .nav-btn-primary:hover {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            opacity: 0.9;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
        }

        /* ================================================================
           СТРАНИЦА ПРОГРАММ
           ================================================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-size: 2rem;
            font-weight: 700;
        }

        .page-header h2 i {
            color: var(--gradient-start);
            margin-right: 10px;
        }

        .search-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .search-box:focus-within {
            border-color: var(--gradient-start);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 0.5rem 0;
            width: 200px;
            background: transparent;
            color: var(--text);
        }

        .search-box i {
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-top: 0.5rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.8rem 1.5rem 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px var(--shadow);
            transition: transform 0.25s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px var(--shadow-hover);
        }

        .card .program-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 0.8rem;
            background: var(--border);
        }

        .card .icon {
            font-size: 2.6rem;
            margin-bottom: 0.4rem;
            color: var(--gradient-start);
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .card .version {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .card .desc {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 1.2rem;
        }

        .card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 0.9rem;
            margin-top: auto;
        }

        .card .meta i {
            margin-right: 4px;
        }

        .card .admin-actions {
            display: flex;
            gap: 8px;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
        }

        .btn-download {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            margin-top: 0.5rem;
            align-self: flex-start;
        }

        .btn-download:hover {
            background: var(--btn-hover);
        }

        .btn-edit {
            background: var(--warning);
            color: #1e293b;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .btn-edit:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* ================================================================
           АДМИН-ПАНЕЛЬ
           ================================================================ */
        .admin-panel {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border);
            margin-top: 2rem;
        }

        .admin-panel h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .admin-panel .sub {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .admin-form .full-width {
            grid-column: 1 / -1;
        }

        .admin-form label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            display: block;
        }

        .admin-form input,
        .admin-form textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95rem;
            transition: 0.2s;
            font-family: inherit;
        }

        .admin-form input:focus,
        .admin-form textarea:focus {
            border-color: var(--gradient-start);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .admin-form textarea {
            resize: vertical;
            min-height: 70px;
        }

        .admin-form .btn-submit {
            grid-column: 1 / -1;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .admin-form .btn-submit:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.25);
        }

        .admin-form .btn-submit.btn-update {
            background: linear-gradient(135deg, var(--warning), #d97706);
        }

        .admin-form small {
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
            font-size: 0.8rem;
        }

        .cancel-btn {
            grid-column: 1 / -1;
            padding: 0.6rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .cancel-btn:hover {
            background: var(--border);
        }

        .admin-list {
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .admin-list-item .info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-list-item .info img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
        }

        .admin-list-item .info i {
            color: var(--gradient-start);
            width: 24px;
        }

        .admin-list-item .actions {
            display: flex;
            gap: 6px;
        }

        .admin-list-item .edit-btn {
            background: var(--warning);
            border: none;
            color: #1e293b;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 8px;
            transition: 0.2s;
            font-family: inherit;
        }

        .admin-list-item .edit-btn:hover {
            transform: scale(1.05);
        }

        .admin-list-item .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .admin-list-item .delete-btn:hover {
            background: #ef444420;
        }

        /* ===== ОКНО ВХОДА ===== */
        .login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .login-overlay.show {
            display: flex;
        }

        .login-box {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        }

        .login-box h2 {
            margin-bottom: 0.5rem;
        }

        .login-box .sub {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .login-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .login-box input:focus {
            border-color: var(--gradient-start);
            outline: none;
        }

        .login-box .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .login-box .btn-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .login-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .admin-form {
                grid-template-columns: 1fr;
            }

            .admin-form .full-width {
                grid-column: 1;
            }

            .admin-form .btn-submit {
                grid-column: 1;
            }

            .navbar {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-controls {
                justify-content: center;
            }

            .search-box input {
                width: 120px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== НАВИГАЦИЯ ===== -->
        <nav class="navbar">
            <div class="nav-logo">
                <i class="fas fa-clover"></i> LuckyFiles
            </div>

            <div class="nav-controls">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i> <span id="themeLabel">Тёмная</span>
                </button>

                <a href="index.html" class="nav-btn">
                    <i class="fas fa-home"></i> Главная
                </a>

                <a href="programs.html" class="nav-btn active">
                    <i class="fas fa-th-list"></i> Программы
                </a>

                <button class="nav-btn nav-btn-primary" onclick="openLogin()">
                    <i class="fas fa-user-shield"></i> Админ
                </button>
            </div>
        </nav>

        <!-- ==============================================================
        СТРАНИЦА ПРОГРАММ
        ============================================================== -->
        <div class="page-header">
            <h2><i class="fas fa-cubes"></i> Все программы</h2>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="filterCards()" />
            </div>
        </div>

        <div class="grid" id="programGrid">
        </div>

        <div style="text-align:center; margin-top:2rem; color:var(--text-muted); font-size:0.9rem;" id="programCount"></div>

        <!-- ==============================================================
        АДМИН-ПАНЕЛЬ (показывается только после входа)
        ============================================================== -->
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <h2><i class="fas fa-user-cog" style="color:var(--gradient-start);"></i> Панель управления</h2>
            <p class="sub">Добавляйте, редактируйте и удаляйте программы</p>

            <form class="admin-form" id="adminForm" onsubmit="saveProgram(event)">
                <input type="hidden" id="editId" value="" />

                <div class="full-width">
                    <label>Название программы *</label>
                    <input type="text" id="progName" placeholder="Например: PhotoMaster Pro" required />
                </div>

                <div>
                    <label>Версия</label>
                    <input type="text" id="progVersion" placeholder="v2.0.0" />
                </div>

                <div>
                    <label>Размер</label>
                    <input type="text" id="progSize" placeholder="24 МБ" />
                </div>

                <div class="full-width">
                    <label>Описание</label>
                    <textarea id="progDesc" placeholder="Краткое описание программы..."></textarea>
                </div>

                <div>
                    <label>Иконка (FontAwesome)</label>
                    <input type="text" id="progIcon" placeholder="fa-image" value="fa-file-zipper" />
                </div>

                <div>
                    <label>Ссылка на скачивание *</label>
                    <input type="url" id="progLink" placeholder="https://cloud.com/file.zip" required />
                </div>

                <div>
                    <label>Категория</label>
                    <input type="text" id="progCategory" placeholder="графика, аудио, система..." />
                </div>

                <div>
                    <label>Количество скачиваний</label>
                    <input type="number" id="progDownloads" placeholder="0" value="0" />
                </div>

                <div class="full-width">
                    <label>Ссылка на картинку программы (необязательно)</label>
                    <input type="url" id="progImageUrl" placeholder="https://i.imgur.com/abc123.jpg" />
                    <small>
                        Загрузите картинку на <a href="https://postimages.org/" target="_blank">PostImages</a> 
                        или <a href="https://imgbb.com/" target="_blank">ImgBB</a> и вставьте прямую ссылку
                    </small>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-plus-circle"></i> Добавить программу
                </button>

                <button type="button" class="cancel-btn" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">
                    <i class="fas fa-times"></i> Отменить редактирование
                </button>
            </form>

            <div class="admin-list" id="adminList">
                <h3 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-secondary);">
                    <i class="fas fa-list"></i> Управление программами
                </h3>
                <div id="adminListItems">
                </div>
            </div>
        </div>

        <!-- ===== ОКНО ВХОДА ===== -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-box">
                <button class="btn-close" onclick="closeLogin()">&times;</button>
                <h2><i class="fas fa-lock" style="color:var(--gradient-start);"></i> Вход в админку</h2>
                <p class="sub">Введите пароль для управления программами</p>

                <input type="password" id="loginPassword" placeholder="Пароль" onkeydown="if(event.key==='Enter') tryLogin()" />
                <div class="login-error" id="loginError">Неверный пароль</div>

                <button class="btn-login" onclick="tryLogin()">
                    <i class="fas fa-arrow-right-to-bracket"></i> Войти
                </button>
            </div>
        </div>

    </div>

    <!-- ================================================================
    JAVASCRIPT
    ================================================================ -->
    <script>
        // ================================================================
        // 1. НАСТРОЙКИ
        // ================================================================

        const ADMIN_PASSWORD = "admin123"; // Смените на свой пароль!

        // ================================================================
        // 2. ДАННЫЕ ПРОГРАММ (localStorage)
        // ================================================================

        const DEFAULT_PROGRAMS = [{
            id: 1,
            name: "PhotoMaster Pro",
            version: "v3.2.1",
            description: "Мощный редактор изображений с AI-инструментами. Работает с RAW и слоями.",
            icon: "fa-image",
            size: "24 МБ",
            downloads: 842,
            link: "https://your-cloud.com/photomaster.zip",
            category: "графика",
            image: "https://picsum.photos/seed/1/400/400"
        }, {
            id: 2,
            name: "AudioCraft Studio",
            version: "v1.8.0",
            description: "Запись, сведение и мастеринг. Поддерживает VST-плагины.",
            icon: "fa-music",
            size: "56 МБ",
            downloads: 312,
            link: "https://your-cloud.com/audiocraft.zip",
            category: "аудио",
            image: "https://picsum.photos/seed/2/400/400"
        }, {
            id: 3,
            name: "DiskCleaner X",
            version: "v2.0.3",
            description: "Очистка системы от мусора, дубликатов и кэша.",
            icon: "fa-broom",
            size: "8 МБ",
            downloads: 1250,
            link: "https://your-cloud.com/diskcleaner.zip",
            category: "система",
            image: "https://picsum.photos/seed/3/400/400"
        }, {
            id: 4,
            name: "NetSecure VPN",
            version: "v4.1.2",
            description: "Быстрый VPN с шифрованием AES-256. Безлимитный трафик.",
            icon: "fa-shield-halved",
            size: "12 МБ",
            downloads: 607,
            link: "https://your-cloud.com/netsecure.zip",
            category: "безопасность",
            image: "https://picsum.photos/seed/4/400/400"
        }, {
            id: 5,
            name: "CodeFusion IDE",
            version: "v0.9.8",
            description: "Лёгкая среда разработки с подсветкой 50+ языков.",
            icon: "fa-code",
            size: "92 МБ",
            downloads: 215,
            link: "https://your-cloud.com/codefusion.zip",
            category: "разработка",
            image: "https://picsum.photos/seed/5/400/400"
        }];

        function getPrograms() {
            const stored = localStorage.getItem("luckyfiles_programs");
            if (stored) {
                try { return JSON.parse(stored); } catch (e) {}
            }
            localStorage.setItem("luckyfiles_programs", JSON.stringify(DEFAULT_PROGRAMS));
            return DEFAULT_PROGRAMS;
        }

        function savePrograms(data) {
            localStorage.setItem("luckyfiles_programs", JSON.stringify(data));
        }

        let programs = getPrograms();
        let nextId = programs.length ? Math.max(...programs.map(p => p.id)) + 1 : 1;

        // ================================================================
        // 3. РЕНДЕРИНГ ПРОГРАММ
        // ================================================================

        let isAdmin = false;

        function renderCards(filtered) {
            const grid = document.getElementById("programGrid");
            const data = filtered || programs;

            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = `
                        <div style="grid-column:1/-1; text-align:center; padding:3rem 0; color:var(--text-muted);">
                            <i class="fas fa-inbox" style="font-size:2.5rem; display:block; margin-bottom:0.5rem;"></i>
                            Программ пока нет
                        </div>
                    `;
                document.getElementById("programCount").textContent = "0 программ";
                return;
            }

            data.forEach(p => {
                const downloadsStr = p.downloads >= 1000 ?
                    (p.downloads / 1000).toFixed(1) + "k" :
                    p.downloads;

                const card = document.createElement("div");
                card.className = "card";

                let imageHtml = "";
                if (p.image) {
                    imageHtml =
                        `<img src="${p.image}" class="program-img" alt="${p.name}" loading="lazy" onerror="this.style.display='none'" />`;
                }

                let adminActionsHtml = "";
                if (isAdmin) {
                    adminActionsHtml = `
                            <div class="admin-actions">
                                <button class="btn-edit" onclick="editProgram(${p.id})">
                                    <i class="fas fa-pen"></i> Редактировать
                                </button>
                            </div>
                        `;
                }

                card.innerHTML = `
                        ${imageHtml}
                        <div class="icon"><i class="fas ${p.icon || 'fa-file-zipper'}"></i></div>
                        <h3>${p.name}</h3>
                        <div class="version">${p.version || ''}</div>
                        <div class="desc">${p.description || 'Без описания'}</div>
                        <div class="meta">
                            <span><i class="fas fa-database"></i> ${p.size || '—'}</span>
                            <span><i class="fas fa-download"></i> ${downloadsStr}</span>
                        </div>
                        <a href="${p.link}" class="btn-download" target="_blank">
                            <i class="fas fa-cloud-arrow-down"></i> Скачать
                        </a>
                        ${adminActionsHtml}
                    `;
                grid.appendChild(card);
            });

            document.getElementById("programCount").textContent = `Всего программ: ${data.length}`;
        }

        // ================================================================
        // 4. ПОИСК
        // ================================================================

        function filterCards() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (!query) {
                renderCards(programs);
                return;
            }

            const filtered = programs.filter(p =>
                p.name.toLowerCase().includes(query) ||
                (p.description && p.description.toLowerCase().includes(query)) ||
                (p.category && p.category.toLowerCase().includes(query))
            );

            renderCards(filtered);
        }

        // ================================================================
        // 5. АДМИНКА
        // ================================================================

        let editingId = null;

        function renderAdminList() {
            const container = document.getElementById("adminListItems");
            if (programs.length === 0) {
                container.innerHTML =
                `<div style="color:var(--text-muted); padding:0.5rem 0;">Программ нет. Добавьте первую!</div>`;
                return;
            }

            container.innerHTML = programs.map(p => `
                    <div class="admin-list-item">
                        <div class="info">
                            ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'" />` : `<i class="fas ${p.icon || 'fa-file-zipper'}"></i>`}
                            <span><strong>${p.name}</strong> ${p.version ? p.version : ''}</span>
                        </div>
                        <div class="actions">
                            <button class="edit-btn" onclick="editProgram(${p.id})">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="delete-btn" onclick="deleteProgram(${p.id})" title="Удалить">
                                <i class="fas fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                `).join("");
        }

        function editProgram(id) {
            const p = programs.find(prog => prog.id === id);
            if (!p) return;

            editingId = id;

            document.getElementById("editId").value = id;
            document.getElementById("progName").value = p.name;
            document.getElementById("progVersion").value = p.version || "";
            document.getElementById("progSize").value = p.size || "";
            document.getElementById("progDesc").value = p.description || "";
            document.getElementById("progIcon").value = p.icon || "fa-file-zipper";
            document.getElementById("progLink").value = p.link;
            document.getElementById("progCategory").value = p.category || "";
            document.getElementById("progDownloads").value = p.downloads || 0;
            document.getElementById("progImageUrl").value = p.image || "";

            const submitBtn = document.getElementById("submitBtn");
            submitBtn.innerHTML = `<i class="fas fa-save"></i> Сохранить изменения`;
            submitBtn.classList.add("btn-update");

            document.getElementById("cancelEditBtn").style.display = "block";

            document.getElementById("adminForm").scrollIntoView({ behavior: "smooth" });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById("editId").value = "";
            document.getElementById("adminForm").reset();
            document.getElementById("progIcon").value = "fa-file-zipper";

            const submitBtn = document.getElementById("submitBtn");
            submitBtn.innerHTML = `<i class="fas fa-plus-circle"></i> Добавить программу`;
            submitBtn.classList.remove("btn-update");

            document.getElementById("cancelEditBtn").style.display = "none";
        }

        function saveProgram(e) {
            e.preventDefault();

            const name = document.getElementById("progName").value.trim();
            const version = document.getElementById("progVersion").value.trim();
            const size = document.getElementById("progSize").value.trim();
            const desc = document.getElementById("progDesc").value.trim();
            const icon = document.getElementById("progIcon").value.trim() || "fa-file-zipper";
            const link = document.getElementById("progLink").value.trim();
            const category = document.getElementById("progCategory").value.trim();
            const downloads = parseInt(document.getElementById("progDownloads").value) || 0;
            const image = document.getElementById("progImageUrl").value.trim();

            if (!name || !link) {
                alert("Название и ссылка на скачивание обязательны!");
                return;
            }

            const editId = document.getElementById("editId").value;

            if (editId) {
                const index = programs.findIndex(p => p.id === parseInt(editId));
                if (index !== -1) {
                    programs[index] = {
                        ...programs[index],
                        name,
                        version,
                        size,
                        description: desc,
                        icon,
                        link,
                        category,
                        downloads,
                        image: image || ""
                    };
                    savePrograms(programs);
                    cancelEdit();
                    renderAdminList();
                    renderCards(programs);
                    alert("✅ Программа обновлена!");
                }
            } else {
                const newProgram = {
                    id: nextId++,
                    name,
                    version,
                    size,
                    description: desc,
                    icon,
                    link,
                    category,
                    downloads,
                    image: image || ""
                };

                programs.push(newProgram);
                savePrograms(programs);
                cancelEdit();
                renderAdminList();
                renderCards(programs);
                alert("✅ Программа добавлена!");
            }
        }

        function deleteProgram(id) {
            if (!confirm("Удалить программу?")) return;
            programs = programs.filter(p => p.id !== id);
            savePrograms(programs);
            renderAdminList();
            renderCards(programs);
        }

        // ================================================================
        // 6. ТЁМНАЯ ТЕМА
        // ================================================================

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute("data-theme");
            const newTheme = current === "dark" ? "light" : "dark";
            html.setAttribute("data-theme", newTheme);

            const icon = document.getElementById("themeIcon");
            const label = document.getElementById("themeLabel");

            if (newTheme === "dark") {
                icon.className = "fas fa-sun";
                label.textContent = "Светлая";
            } else {
                icon.className = "fas fa-moon";
                label.textContent = "Тёмная";
            }

            localStorage.setItem("luckyfiles_theme", newTheme);
        }

        const savedTheme = localStorage.getItem("luckyfiles_theme");
        if (savedTheme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            document.getElementById("themeIcon").className = "fas fa-sun";
            document.getElementById("themeLabel").textContent = "Светлая";
        }

        // ================================================================
        // 7. ВХОД В АДМИНКУ
        // ================================================================

        function openLogin() {
            document.getElementById("loginOverlay").classList.add("show");
            document.getElementById("loginPassword").value = "";
            document.getElementById("loginError").style.display = "none";
            document.getElementById("loginPassword").focus();
        }

        function closeLogin() {
            document.getElementById("loginOverlay").classList.remove("show");
        }

        function tryLogin() {
            const pass = document.getElementById("loginPassword").value;
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                closeLogin();
                document.getElementById("adminPanel").style.display = "block";
                renderAdminList();
                renderCards(programs);
                alert("🔓 Вы вошли как администратор!");
            } else {
                document.getElementById("loginError").style.display = "block";
                document.getElementById("loginPassword").value = "";
                document.getElementById("loginPassword").focus();
            }
        }

        document.getElementById("loginOverlay").addEventListener("click", function(e) {
            if (e.target === this) closeLogin();
        });

        // ================================================================
        // 8. СТАРТ
        // ================================================================

        renderCards(programs);

        console.log("🍀 LuckyFiles — страница программ загружена!");
        console.log("🔑 Пароль админа: admin123 (смените в коде)");
    </script>

</body>
</html>
