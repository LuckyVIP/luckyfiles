<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuckyFiles — программы</title>

    <!-- Аватарка -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Y0pK8C0C/Nikita-red-back.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== ПЕРЕМЕННЫЕ ===== */
        :root {
            --bg: #f6f9fc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.04);
            --shadow-hover: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
            --gradient-start: #3b82f6;
            --gradient-end: #8b5cf6;
            --btn-bg: #1e293b;
            --btn-text: #ffffff;
            --btn-hover: #0f172a;
        }

        [data-theme="dark"] {
            --bg: #0a0a0f;
            --bg-card: #18181f;
            --text: #e9e9f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a82;
            --border: #2a2a35;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
            --input-bg: #22222b;
            --gradient-start: #4f8df7;
            --gradient-end: #9b6cf7;
            --btn-bg: #3b3b4a;
            --btn-text: #ffffff;
            --btn-hover: #4f4f62;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 0.5rem;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .nav-logo i {
            -webkit-text-fill-color: var(--gradient-start);
            margin-right: 6px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .theme-toggle,
        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            font-family: inherit;
            white-space: nowrap;
        }

        .theme-toggle:hover,
        .nav-btn:hover {
            background: var(--border);
            transform: scale(1.02);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
        }

        /* ================================================================
           СТРАНИЦА ПРОГРАММ
           ================================================================ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .page-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .page-header h2 i {
            color: var(--gradient-start);
            margin-right: 8px;
        }

        .search-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            flex: 1;
            min-width: 140px;
            max-width: 280px;
        }

        .search-box:focus-within {
            border-color: var(--gradient-start);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 0.9rem;
            padding: 0.4rem 0;
            width: 100%;
            background: transparent;
            color: var(--text);
        }

        .search-box i {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 1.5rem 1.2rem 1.2rem;
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px var(--shadow);
            transition: transform 0.25s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px var(--shadow-hover);
        }

        .card .program-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 0.6rem;
            background: var(--border);
        }

        .card .icon {
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
            color: var(--gradient-start);
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card .version {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .card .desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 1rem;
        }

        .card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 0.7rem;
            margin-top: auto;
        }

        .card .meta i {
            margin-right: 4px;
        }

        .btn-download {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            margin-top: 0.4rem;
            align-self: flex-start;
        }

        .btn-download:hover {
            background: var(--btn-hover);
        }

        #programCount {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ==============================================================
        АДАПТИВ
        ============================================================== */

        /* Планшеты */
        @media (max-width: 992px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
        }

        /* Телефоны */
        @media (max-width: 768px) {
            body {
                padding: 0.8rem;
            }

            .container {
                padding: 0;
            }

            .navbar {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }

            .nav-controls {
                justify-content: center;
                gap: 0.4rem;
            }

            .theme-toggle,
            .nav-btn {
                font-size: 0.75rem;
                padding: 0.3rem 0.6rem;
            }

            .nav-logo {
                text-align: center;
                font-size: 1.4rem;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
                margin-bottom: 1.2rem;
            }

            .page-header h2 {
                font-size: 1.4rem;
                text-align: center;
            }

            .search-box {
                max-width: 100%;
                min-width: unset;
                padding: 0.3rem 0.8rem;
            }

            .search-box input {
                font-size: 0.85rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }

            .card {
                padding: 1.2rem 1rem 1rem;
                border-radius: 16px;
            }

            .card .program-img {
                border-radius: 12px;
                margin-bottom: 0.5rem;
            }

            .card .icon {
                font-size: 1.8rem;
                margin-bottom: 0.2rem;
            }

            .card h3 {
                font-size: 1rem;
            }

            .card .desc {
                font-size: 0.85rem;
                margin-bottom: 0.8rem;
            }

            .card .meta {
                font-size: 0.7rem;
                padding-top: 0.5rem;
            }

            .btn-download {
                font-size: 0.75rem;
                padding: 0.35rem 0.9rem;
                align-self: stretch;
                justify-content: center;
            }

            #programCount {
                font-size: 0.8rem;
                margin-top: 1.2rem;
            }
        }

        /* Очень маленькие телефоны */
        @media (max-width: 380px) {
            .nav-controls {
                gap: 0.3rem;
            }

            .theme-toggle,
            .nav-btn {
                font-size: 0.65rem;
                padding: 0.2rem 0.5rem;
            }

            .page-header h2 {
                font-size: 1.2rem;
            }

            .card {
                padding: 1rem 0.8rem 0.8rem;
            }

            .card .desc {
                font-size: 0.8rem;
            }

            .card .meta {
                font-size: 0.65rem;
                flex-wrap: wrap;
                gap: 0.2rem;
            }

            .btn-download {
                font-size: 0.7rem;
                padding: 0.3rem 0.7rem;
            }
        }
    </style>
</head>
<body>

                <a href="index.html" class="nav-btn">

        <div class="grid" id="programGrid"></div>

        <div id="programCount"></div>

        }];

        // ================================================================
        // РЕНДЕРИНГ
        // ================================================================

        function renderCards(filtered) {
            const grid = document.getElementById("programGrid");
            const data = filtered || PROGRAMS;

            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:2rem 0; color:var(--text-muted);">
                        <i class="fas fa-inbox" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                        Программ пока нет
                    </div>
                `;
                document.getElementById("programCount").textContent = "0 программ";
                return;
            }

            data.forEach(p => {
                const downloadsStr = p.downloads >= 1000 ?
                    (p.downloads / 1000).toFixed(1) + "k" :
                    p.downloads;

                const card = document.createElement("div");
                card.className = "card";

                let imageHtml = "";
                if (p.image) {
                    imageHtml = `<img src="${p.image}" class="program-img" alt="${p.name}" loading="lazy" onerror="this.style.display='none'" />`;
                }

                card.innerHTML = `
                    ${imageHtml}
                    <div class="icon"><i class="fas ${p.icon || 'fa-file-zipper'}"></i></div>
                    <h3>${p.name}</h3>
                    <div class="version">${p.version || ''}</div>
                    <div class="desc">${p.description || 'Без описания'}</div>
                    <div class="meta">
                        <span><i class="fas fa-database"></i> ${p.size || '—'}</span>
                        <span><i class="fas fa-download"></i> ${downloadsStr}</span>
                    </div>
                    <a href="${p.link}" class="btn-download" target="_blank">
                        <i class="fas fa-cloud-arrow-down"></i> Скачать
                    </a>
                `;
                grid.appendChild(card);
            });

            document.getElementById("programCount").textContent = `Всего программ: ${data.length}`;
        }

        // ================================================================
        // ПОИСК
        // ================================================================

        function filterCards() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (!query) {
                renderCards(PROGRAMS);
                return;
            }

            const filtered = PROGRAMS.filter(p =>
                p.name.toLowerCase().includes(query) ||
                (p.description && p.description.toLowerCase().includes(query)) ||
                (p.category && p.category.toLowerCase().includes(query))
            );

            renderCards(filtered);
        }

        // ================================================================
        // ТЁМНАЯ ТЕМА
        // ================================================================

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute("data-theme");
            const newTheme = current === "dark" ? "light" : "dark";
            html.setAttribute("data-theme", newTheme);

            const icon = document.getElementById("themeIcon");
            const label = document.getElementById("themeLabel");

            if (newTheme === "dark") {
                icon.className = "fas fa-sun";
                label.textContent = "Светлая";
            } else {
                icon.className = "fas fa-moon";
                label.textContent = "Тёмная";
            }

            localStorage.setItem("luckyfiles_theme", newTheme);
        }

        const savedTheme = localStorage.getItem("luckyfiles_theme");
        if (savedTheme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            document.getElementById("themeIcon").className = "fas fa-sun";
            document.getElementById("themeLabel").textContent = "Светлая";
        }

        // ================================================================
        // СТАРТ
        // ================================================================

        renderCards(PROGRAMS);

        console.log("🍀 LuckyFiles — страница программ загружена!");
        console.log("📝 Чтобы изменить программы — отредактируй массив PROGRAMS в коде");
    </script>
