<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geometry Dash — LuckyFiles</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Y0pK8C0C/Nikita-red-back.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #18181f;
            --text: #e9e9f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a82;
            --border: #2a2a35;
            --gradient-start: #4f8df7;
            --gradient-end: #9b6cf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            overflow: hidden;
            height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem;
            padding-bottom: 0.8rem; border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-btn {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text); padding: 0.4rem 0.8rem; border-radius: 40px;
            cursor: pointer; font-size: 0.8rem; transition: 0.2s;
            text-decoration: none;
        }

        .nav-btn:hover { background: var(--border); }
        .nav-btn.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white; border: none;
        }

        .game-wrapper {
            background: var(--bg-card); border-radius: 20px;
            border: 1px solid var(--border); padding: 1.5rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.3);
        }

        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.8rem; flex-wrap: wrap; gap: 10px;
        }

        .score-container {
            display: flex; gap: 20px; font-weight: 700;
        }

        .game-container {
            position: relative; width: 100%; height: 400px;
            background: #1a1a2e; border-radius: 16px;
            overflow: hidden; border: 2px solid var(--border);
            cursor: pointer;
        }

        .ground {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 60px; background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-top: 3px solid #4a4a6a;
        }

        .player {
            position: absolute; left: 80px; width: 40px; height: 40px;
            background-size: cover; background-position: center;
            border-radius: 6px;
            box-shadow: 0 0 25px rgba(79, 141, 247, 0.6);
            z-index: 10;
            transition: none;
            will-change: transform;
            cursor: pointer;
        }

        .obstacle { position: absolute; bottom: 60px; z-index: 5; }

        .spike::before {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 100%; height: 100%; background: #ef4444;
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .game-over {
            position: absolute; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px); z-index: 20; text-align: center;
        }
        .game-over.show { display: flex; }

        .new-record {
            color: #ffd700;
            font-size: 1.1rem;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <a href="index.html" class="nav-logo"><i class="fas fa-clover"></i> LuckyFiles</a>
        <div class="nav-controls">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Главная</a>
            <a href="programs.html" class="nav-btn"><i class="fas fa-th-list"></i> Программы</a>
            <a href="modpacks.html" class="nav-btn"><i class="fas fa-cubes"></i> Модпаки</a>
            <a href="geometry.html" class="nav-btn active"><i class="fas fa-gamepad"></i> Geometry</a>
        </div>
    </nav>

    <div class="game-wrapper">
        <div class="game-header">
            <h2>🎮 Geometry Dash</h2>
            <div class="score-container">
                <div><i class="fas fa-star"></i> <span id="scoreDisplay">0</span></div>
                <div style="color:#ffd700;"><i class="fas fa-trophy"></i> <span id="highScoreDisplay">0</span></div>
            </div>
        </div>

        <div class="game-container" id="gameContainer">
            <div class="ground"></div>
            <div class="player" id="player"></div>
            
            <div class="game-over" id="gameOver">
                <h1 style="color:#ef4444;font-size:2.8rem;margin-bottom:0.3rem;">💀 GAME OVER</h1>
                <p style="color:#a0a0b8;font-size:1.2rem;">Твой счёт: <span id="finalScore">0</span></p>
                
                <div id="recordMessage" class="new-record" style="display:none;">
                    🎉 Новый рекорд!
                </div>
                
                <div style="margin:15px 0;font-size:1.1rem;">Лучший: <span id="finalHighScore" style="color:#ffd700;"></span></div>
                
                <button onclick="restartGame()" style="padding:0.7rem 2.5rem;background:linear-gradient(135deg,#4f8df7,#9b6cf7);color:white;border:none;border-radius:50px;font-size:1.1rem;cursor:pointer;">
                    <i class="fas fa-redo"></i> Играть снова
                </button>
            </div>
        </div>

        <div class="hint" style="text-align:center;color:#6a6a82;margin-top:0.8rem;font-size:0.9rem;">
            <i class="fas fa-keyboard"></i> <strong>ПРОБЕЛ</strong> или <strong>КЛИК</strong> по полю — прыжок<br>
            <small>Клик по кубику — сменить иконку</small>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('gameContainer');
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');
    const finalHighScoreDisplay = document.getElementById('finalHighScore');
    const recordMessage = document.getElementById('recordMessage');
    const gameOverEl = document.getElementById('gameOver');

    let isGameOver = false;
    let score = 0;
    let highScore = localStorage.getItem('gdHighScore') || 0;
    let velocity = 0;
    let playerY = 0;
    let rotation = 0;
    let gameSpeed = 5;
    let spawnTimer = 0;
    let spawnInterval = 70;
    let obstacles = [];
    let animationId = null;

    const GROUND_HEIGHT = 60;
    const PLAYER_SIZE = 40;
    const PLAYER_X = 80;
    const GRAVITY = -0.65;
    const JUMP = 14.5;

    let currentSkin = 0;
    const skins = [
        "https://i.imgur.com/gvWGGy6.gif",
        "https://i.imgur.com/6oBBubQ.jpeg",
        "https://i.imgur.com/JBqjMQo.png",
        "https://i.imgur.com/No8axGh.png"
    ];

    function setPlayerSkin() {
        player.style.backgroundImage = `url('${skins[currentSkin]}')`;
    }

    function changeSkin() {
        currentSkin = (currentSkin + 1) % skins.length;
        setPlayerSkin();
    }

    function updateHighScoreDisplay() {
        highScoreDisplay.textContent = highScore;
    }

    function spawnObstacle() {
        const obs = document.createElement('div');
        obs.className = 'obstacle';
        obs.style.right = '-40px';
        const height = Math.random() < 0.5 ? 40 : 55;
        obs.innerHTML = `<div class="spike" style="width:32px;height:${height}px"></div>`;
        container.appendChild(obs);
        
        obstacles.push({
            element: obs,
            x: container.offsetWidth + 20,
            width: 32,
            height: height
        });
    }

    function updateGame() {
        if (isGameOver) return;

        velocity += GRAVITY;
        playerY += velocity;

        if (playerY <= 0) {
            playerY = 0;
            velocity = 0;
            rotation = Math.round(rotation / 90) * 90;
        }
        if (playerY > 280) playerY = 280;

        player.style.bottom = `${GROUND_HEIGHT + playerY}px`;
        player.style.transform = `rotate(${rotation}deg)`;

        if (playerY > 5) rotation += 8;

        spawnTimer++;
        if (spawnTimer >= spawnInterval) {
            spawnTimer = 0;
            spawnInterval = Math.max(45, 70 - Math.floor(score / 15));
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.x -= gameSpeed;
            obs.element.style.right = `${container.offsetWidth - obs.x}px`;

            if (
                PLAYER_X + PLAYER_SIZE - 8 > obs.x &&
                PLAYER_X + 8 < obs.x + obs.width &&
                playerY + PLAYER_SIZE - 8 > 0 &&
                playerY + 8 < obs.height
            ) {
                gameOver();
                return;
            }

            if (obs.x < -50) {
                obs.element.remove();
                obstacles.splice(i, 1);
                score++;
                scoreDisplay.textContent = score;
                gameSpeed = Math.min(9.5, 5 + Math.floor(score / 30));
            }
        }

        animationId = requestAnimationFrame(updateGame);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        cancelAnimationFrame(animationId);

        let isNewRecord = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('gdHighScore', highScore);
            isNewRecord = true;
        }

        finalScoreDisplay.textContent = score;
        finalHighScoreDisplay.textContent = highScore;
        updateHighScoreDisplay();

        if (isNewRecord) {
            recordMessage.style.display = 'block';
        }

        gameOverEl.classList.add('show');
    }

    function jump() {
        if (isGameOver || playerY > 8) return;
        velocity = JUMP;
    }

    function restartGame() {
        obstacles.forEach(o => o.element.remove());
        obstacles = [];
        score = 0;
        scoreDisplay.textContent = '0';
        velocity = 0;
        playerY = 0;
        rotation = 0;
        gameSpeed = 5;
        spawnTimer = 0;
        spawnInterval = 70;
        isGameOver = false;
        recordMessage.style.display = 'none';
        gameOverEl.classList.remove('show');
        
        player.style.bottom = `${GROUND_HEIGHT}px`;
        player.style.transform = 'rotate(0deg)';
        updateGame();
    }

    // Управление
    container.addEventListener('click', (e) => {
        if (e.target.id === 'player') {
            changeSkin();
        } else {
            jump();
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            jump();
        }
        if (e.key === 'Enter' && isGameOver) restartGame();
    });

    // Инициализация
    updateHighScoreDisplay();
    setPlayerSkin();
    player.style.bottom = `${GROUND_HEIGHT}px`;
    updateGame();
</script>

</body>
</html>
